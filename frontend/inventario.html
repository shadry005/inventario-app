<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #f5f0eb 0%, #ede4db 50%, #e8ddd0 100%);
            min-height: 100vh;
            color: #5d4037;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #6d4c41 0%, #5d4037 50%, #4e342e 100%);
            padding: 1.2rem 2rem;
            box-shadow: 0 4px 20px rgba(62, 39, 35, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            color: #efebe9;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar h1 .icon {
            font-size: 2rem;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
        }

        .navbar .date {
            color: #d7ccc8;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* Contenedor principal */
        .container {
            max-width: 1400px;
            margin: 2.5rem auto;
            padding: 0 2rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .summary-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 20px;
            padding: 1.25rem 1.5rem;
            box-shadow:
                inset 2px 2px 6px rgba(255, 255, 255, 0.7),
                inset -3px -3px 6px rgba(109, 76, 65, 0.12),
                8px 10px 24px rgba(93, 64, 55, 0.12);
        }

        .summary-card .summary-label {
            color: #8d6e63;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .summary-card .summary-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #6d4c41;
        }

        .filter-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.45);
            color: #5d4037;
            border: 1px solid rgba(255, 255, 255, 0.35);
            padding: 0.7rem 1rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow:
                inset 2px 2px 5px rgba(255, 255, 255, 0.7),
                inset -3px -3px 5px rgba(109, 76, 65, 0.12),
                6px 8px 18px rgba(93, 64, 55, 0.1);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #8d6e63 0%, #6d4c41 100%);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow:
                inset 2px 2px 6px rgba(255, 255, 255, 0.2),
                inset -3px -3px 6px rgba(0, 0, 0, 0.2),
                8px 10px 20px rgba(93, 64, 55, 0.22);
        }

        /* Tarjetas de estadísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(93, 64, 55, 0.08);
            border: 1px solid #d7ccc8;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(161, 136, 127, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(30px, -30px);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(93, 64, 55, 0.15);
            border-color: #a1887f;
        }

        .stat-card:nth-child(1) { border-top: 4px solid #8d6e63; }
        .stat-card:nth-child(2) { border-top: 4px solid #a1887f; }
        .stat-card:nth-child(3) { border-top: 4px solid #bcaaa4; }

        .stat-icon {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .stat-label {
            color: #8d6e63;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .stat-card:nth-child(1) .stat-number { color: #6d4c41; }
        .stat-card:nth-child(2) .stat-number { color: #795548; }
        .stat-card:nth-child(3) .stat-number { color: #8d6e63; }

        /* Botones */
        .actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Lato', sans-serif;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .btn-refresh {
            background: #ffffff;
            color: #5d4037;
            border: 2px solid #bcaaa4;
        }

        .btn-refresh:hover {
            background: #efebe9;
            border-color: #8d6e63;
        }

        .btn-add {
            background: linear-gradient(135deg, #8d6e63 0%, #6d4c41 100%);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(109, 76, 65, 0.3);
        }

        .btn-add:hover {
            background: linear-gradient(135deg, #795548 0%, #5d4037 100%);
            box-shadow: 0 6px 20px rgba(109, 76, 65, 0.4);
        }

        .btn-edit {
            background: #ffffff;
            color: #8d6e63;
            border: 2px solid #bcaaa4;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .btn-edit:hover {
            background: #efebe9;
            border-color: #8d6e63;
        }

        .btn-delete {
            background: #ffffff;
            color: #c0392b;
            border: 2px solid #e0c0c0;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .btn-delete:hover {
            background: #fdf2f2;
            border-color: #c0392b;
        }

        .btn-save {
            background: linear-gradient(135deg, #8d6e63 0%, #6d4c41 100%);
            color: #ffffff;
        }

        .btn-save:hover {
            background: linear-gradient(135deg, #795548 0%, #5d4037 100%);
        }

        .btn-cancel {
            background: #ffffff;
            color: #5d4037;
            border: 2px solid #d7ccc8;
        }

        .btn-cancel:hover {
            background: #f5f0eb;
        }

        /* Tabla */
        .table-container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(93, 64, 55, 0.08);
            overflow: hidden;
            border: 1px solid #d7ccc8;
        }

        .table-header {
            background: linear-gradient(135deg, #8d6e63 0%, #6d4c41 100%);
            padding: 1.5rem 2rem;
        }

        .table-header h2 {
            font-family: 'Playfair Display', serif;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #efebe9 0%, #d7ccc8 100%);
        }

        th {
            padding: 1.1rem 1.5rem;
            text-align: left;
            font-weight: 700;
            color: #5d4037;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 2px solid #bcaaa4;
        }

        td {
            padding: 1.1rem 1.5rem;
            border-bottom: 1px solid #e8ddd0;
            color: #5d4037;
            font-size: 0.9rem;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: #faf7f4;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Badges de stock */
        .stock-badge {
            padding: 0.3rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .stock-high {
            background: #e8e0d5;
            color: #5d4037;
            border: 1px solid #bcaaa4;
        }

        .stock-medium {
            background: #f0e6d8;
            color: #8d6e63;
            border: 1px solid #d4c5b2;
        }

        .stock-low {
            background: #f5e6e0;
            color: #a0522d;
            border: 1px solid #c9a99a;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(62, 39, 35, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { 
                transform: translateY(30px); 
                opacity: 0; 
            }
            to { 
                transform: translateY(0); 
                opacity: 1; 
            }
        }

        .modal-content {
            background: #ffffff;
            width: 95%;
            max-width: 520px;
            margin: 50px auto;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(62, 39, 35, 0.3);
            animation: slideUp 0.4s ease;
            border: 1px solid #d7ccc8;
        }

        .modal-content h2 {
            font-family: 'Playfair Display', serif;
            color: #5d4037;
            font-size: 1.6rem;
            margin-bottom: 2rem;
            font-weight: 600;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e8ddd0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #6d4c41;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #d7ccc8;
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: 'Lato', sans-serif;
            transition: all 0.3s ease;
            color: #5d4037;
            background: #faf7f4;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #8d6e63;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(141, 110, 99, 0.1);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #bcaaa4;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px solid #e8ddd0;
        }

        /* Estado vacío */
        .empty-state {
            text-align: center;
            padding: 3.5rem 2rem;
            color: #8d6e63;
        }

        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        .empty-state p {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .empty-state small {
            font-size: 0.85rem;
            color: #a1887f;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar h1 {
                font-size: 1.4rem;
            }
            
            .navbar {
                padding: 1rem;
            }
            
            .container {
                padding: 0 1rem;
                margin: 1.5rem auto;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .table-container {
                overflow-x: auto;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .modal-content {
                margin: 20px auto;
                padding: 1.5rem;
            }
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f5f0eb;
        }

        ::-webkit-scrollbar-thumb {
            background: #bcaaa4;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #8d6e63;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <h1>
                <span class="icon">📦</span>
                Inventario
            </h1>
            <div class="date" id="currentDate"></div>
        </div>
    </nav>
    
    <div class="container">
        <div class="filter-group">
            <button class="btn filter-btn active" data-branch="all">Todas</button>
            <button class="btn filter-btn" data-branch="1">Sucursal 1</button>
            <button class="btn filter-btn" data-branch="2">Sucursal 2</button>
            <button class="btn filter-btn" data-branch="3">Sucursal 3</button>
        </div>

        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-label">Existencias totales</div>
                <div class="summary-value" id="totalStock">0</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">Valor total</div>
                <div class="summary-value" id="totalValue">$0</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">Sucursal activa</div>
                <div class="summary-value" id="activeBranch">Todas</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>Inventario completo</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Producto</th>
                        <th>Sucursal</th>
                        <th>Stock</th>
                        <th>Precio</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const inventoryData = [
            { id: 1, nombre: 'Café Premium', sucursal: 1, stock: 24, precio: 12990 },
            { id: 2, nombre: 'Té Verde', sucursal: 1, stock: 15, precio: 8990 },
            { id: 3, nombre: 'Pan Integral', sucursal: 2, stock: 32, precio: 6500 },
            { id: 4, nombre: 'Arroz Orgánico', sucursal: 2, stock: 18, precio: 10990 },
            { id: 5, nombre: 'Aceite de Oliva', sucursal: 3, stock: 10, precio: 24990 },
            { id: 6, nombre: 'Mermelada Artesanal', sucursal: 3, stock: 27, precio: 13990 },
            { id: 7, nombre: 'Harina de Trigo', sucursal: 1, stock: 41, precio: 7890 },
            { id: 8, nombre: 'Chocolate Negro', sucursal: 2, stock: 9, precio: 11990 }
        ];

        let activeBranch = 'all';

        function updateDate() {
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            };
            const fecha = new Date().toLocaleDateString('es-ES', options);
            document.getElementById('currentDate').textContent =
                fecha.charAt(0).toUpperCase() + fecha.slice(1);
        }
        updateDate();

        function getFilteredInventory() {
            if (activeBranch === 'all') return inventoryData;
            return inventoryData.filter(item => item.sucursal === Number(activeBranch));
        }

        function getStockClass(stock) {
            if (stock > 20) return 'stock-high';
            if (stock > 5) return 'stock-medium';
            return 'stock-low';
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('es-ES', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 0
            }).format(value);
        }

        function renderInventory() {
            const filtered = getFilteredInventory();
            const tbody = document.getElementById('inventoryBody');

            document.getElementById('activeBranch').textContent =
                activeBranch === 'all' ? 'Todas' : `Sucursal ${activeBranch}`;

            const totalStock = filtered.reduce((sum, item) => sum + item.stock, 0);
            const totalValue = filtered.reduce((sum, item) => sum + (item.stock * item.precio), 0);

            document.getElementById('totalStock').textContent = totalStock;
            document.getElementById('totalValue').textContent = formatCurrency(totalValue);

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <div class="empty-icon">📭</div>
                                <p>No hay productos para esta sucursal</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filtered.map(item => `
                <tr>
                    <td><strong>#${item.id}</strong></td>
                    <td>${item.nombre}</td>
                    <td>Sucursal ${item.sucursal}</td>
                    <td>
                        <span class="stock-badge ${getStockClass(item.stock)}">
                            ${item.stock} unid.
                        </span>
                    </td>
                    <td>${formatCurrency(item.precio)}</td>
                    <td><strong>${formatCurrency(item.stock * item.precio)}</strong></td>
                </tr>
            `).join('');
        }

        document.querySelectorAll('.filter-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                activeBranch = button.dataset.branch;
                renderInventory();
            });
        });

        renderInventory();
    </script>
</body>
</html>
