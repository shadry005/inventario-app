<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Iniciar Sesión Dinámico</title>
    <style>
        /* Paleta de colores basada en la interfaz original y efectos */
        :root {
            --bg-color-static: #f2eae1; /* Color de fondo base (crema) */
            --bg-gradient-start: #76584b; /* Color marrón oscuro para el fondo animado */
            --bg-gradient-end: #3d2b24; /* Color aún más oscuro para el fondo animado */
            --primary-brown: #76584b; /* Marrón oscuro principal (para títulos) */
            --accent-brown: #563f35; /* Marrón más oscuro para hover y acentos */
            --text-color: #3d2b24; /* Texto oscuro */
            --glass-bg: rgba(255, 255, 255, 0.4); /* Fondo de cristal más transparente */
            --glass-border: rgba(255, 255, 255, 0.4); /* Borde de cristal */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenedor principal con fondo estático */
        body {
            background-color: var(--bg-color-static);
            min-height: 100vh;
            padding: 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Para contener las formas animadas */
            position: relative; /* Base para el posicionamiento absoluto */
        }

        /* --- FONDO ANIMADO --- */
        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Detrás del contenido */
            background: linear-gradient(45deg, var(--bg-gradient-start), var(--bg-gradient-end));
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Formas animadas adicionales para profundidad */
        .animated-bg::before,
        .animated-bg::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        .animated-bg::before {
            width: 300px;
            height: 300px;
            top: -150px;
            left: -150px;
        }

        .animated-bg::after {
            width: 400px;
            height: 400px;
            bottom: -200px;
            right: -200px;
            animation-duration: 25s;
            animation-direction: reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, 50px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* --- FIN FONDO ANIMADO --- */

        /* Contenedor Principal: GLASSMORPHISM */
        .login-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px); /* Efecto de desenfoque de fondo */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem 3rem; /* Espaciado interno aumentado */
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 40px 0 rgba(118, 88, 75, 0.2);
            text-align: center;
            z-index: 1; /* Por encima del fondo animado */
            position: relative; /* Para el z-index */
        }

        .login-header h1 {
            font-size: 2.5rem;
            color: var(--primary-brown);
            margin-bottom: 0.75rem;
            font-weight: 700;
        }

        .login-header p {
            font-size: 1rem;
            color: #665248;
            margin-bottom: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.75rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--primary-brown);
        }

        /* Inputs y Selects: CLAYMORPHISM */
        .clay-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1.1rem;
            border: none;
            outline: none;
            border-radius: 18px;
            background: #fdfaf7; /* Fondo de entrada más claro y cremoso */
            color: var(--text-color);
            /* Efecto Clay: sombras externas sutiles + sombra interna blanca/oscura */
            box-shadow: 
                inset 3px 3px 6px rgba(118, 88, 75, 0.1), 
                inset -4px -4px 8px rgba(255, 255, 255, 0.9),
                2px 5px 8px rgba(118, 88, 75, 0.05);
            transition: all 0.3s ease;
        }

        .clay-input:focus {
            box-shadow: 
                inset 2px 2px 4px rgba(118, 88, 75, 0.15), 
                inset -3px -3px 6px rgba(255, 255, 255, 0.95),
                0 0 0 4px rgba(118, 88, 75, 0.2);
            background: #ffffff;
        }

        /* Botón de envío: CLAYMORPHISM en Marrón con interacción animada */
        .btn-submit {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 18px;
            background: var(--primary-brown);
            color: #ffffff;
            cursor: pointer;
            margin-top: 1.25rem;
            /* Efecto Clay para el botón */
            box-shadow: 
                inset 4px 4px 8px rgba(255, 255, 255, 0.3), 
                inset -4px -4px 8px rgba(0, 0, 0, 0.2),
                0px 8px 16px rgba(118, 88, 75, 0.25);
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            position: relative; /* Para la animación de hover */
            overflow: hidden; /* Contener el efecto de brillo */
        }

        .btn-submit:hover {
            background: var(--accent-brown);
            transform: translateY(-2px);
            box-shadow: 
                inset 4px 4px 8px rgba(255, 255, 255, 0.3), 
                inset -4px -4px 8px rgba(0, 0, 0, 0.2),
                0px 10px 20px rgba(118, 88, 75, 0.35);
        }

        .btn-submit:active {
            transform: translateY(1px);
            box-shadow: 
                inset 3px 3px 6px rgba(0, 0, 0, 0.3), 
                inset -3px -3px 6px rgba(255, 255, 255, 0.1),
                0px 4px 8px rgba(118, 88, 75, 0.2);
        }

        /* Efecto de brillo animado en hover para el botón */
        .btn-submit::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            transform: rotate(45deg);
        }

        .btn-submit:hover::after {
            opacity: 1;
            animation: shine 1s linear infinite;
        }

        @keyframes shine {
            0% { transform: translate(-100%, -100%) rotate(45deg); }
            100% { transform: translate(100%, 100%) rotate(45deg); }
        }
        /* --------- Registro --------- */

.separator{
    margin:25px 0;
    border:none;
    border-top:1px solid rgba(118,88,75,.3);
}

.register-title{
    font-size:1.5rem;

}
    </style>
</head>

    <!-- Elemento para el fondo animado -->

<h2 class="register-title">Registro de Usuario</h2>
